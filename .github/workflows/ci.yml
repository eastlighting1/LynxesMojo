name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Rust: format + clippy ─────────────────────────────────────────────────────
  rust-lint:
    name: Rust lint (fmt + clippy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          # Only cache the workspace crates that don't need Python
          workspaces: ". -> target"

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: |
          cargo clippy \
            --workspace \
            --exclude lynxes-python \
            --all-targets \
            -- -D warnings

  # ── Rust: unit + integration tests ───────────────────────────────────────────
  rust-test:
    name: Rust tests
    runs-on: ubuntu-latest
    env:
      LYNXES_MOJO_LIB: ${{ github.workspace }}/py-lynxes/src/lynxes/.libs/liblynxes_mojo_kernels.so
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python for Mojo install
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Mojo compiler
        run: |
          python -m pip install --upgrade pip
          python -m pip install mojo --extra-index-url https://modular.gateway.scarf.sh/simple/
          mojo --version

      - name: Build Mojo shared library
        shell: bash
        run: bash scripts/build_mojo_kernels.sh

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Run tests (excluding Python crate)
        run: |
          cargo test \
            --workspace \
            --exclude lynxes-python \
            --exclude graphframe-core \
            --exclude graphframe-py \
            --exclude graphframe-cli

  # ── Python: build + pytest ────────────────────────────────────────────────────
  python-test:
    name: Python tests (Linux, ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    env:
      LYNXES_MOJO_LIB: ${{ github.workspace }}/py-lynxes/src/lynxes/.libs/liblynxes_mojo_kernels.so
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Mojo compiler
        run: |
          python -m pip install --upgrade pip
          python -m pip install mojo --extra-index-url https://modular.gateway.scarf.sh/simple/
          mojo --version

      - name: Build Mojo shared library
        shell: bash
        run: bash scripts/build_mojo_kernels.sh

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "crates/lynxes-python -> target"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install Python dependencies + build extension
        working-directory: py-lynxes
        run: |
          uv sync --group dev
          uv run maturin develop --release

      - name: Run pytest
        working-directory: py-lynxes
        run: uv run pytest tests/unit -v --tb=short

  # ── Python: type-check + lint ─────────────────────────────────────────────────
  python-lint:
    name: Python lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Run ruff check
        working-directory: py-lynxes
        run: |
          uv run --with ruff ruff check src/ tests/

      - name: Run ruff format check
        working-directory: py-lynxes
        run: |
          uv run --with ruff ruff format --check src/ tests/

  # ── Summary gate ─────────────────────────────────────────────────────────────
  # Single required check for branch protection rules
  ci-pass:
    name: CI passed
    needs: [rust-lint, rust-test, python-test, python-lint]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.rust-lint.result }}" != "success" ||
                "${{ needs.rust-test.result }}" != "success" ||
                "${{ needs.python-test.result }}" != "success" ||
                "${{ needs.python-lint.result }}" != "success" ]]; then
            echo "One or more CI jobs failed."
            exit 1
          fi
          echo "All CI jobs passed."
